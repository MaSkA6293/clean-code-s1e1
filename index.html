<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
          rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>
  <body>
    <div class="header">
      <img class="header__image" src="./eisenhower-matrix.jpg">
      <a class="header__more-info" href="https://goal-life.com/page/method/matrix-eisenhower">
        Want more details?
      </a>
    </div>
    <div class="main">
      <p id="section-add">
        <label for="new-task" class="main__new-task-label" >Add Item</label>
        <input id="new-task" type="text" >
        <button class="button main__button">Add</button>
      </p>
      <h3 class="main__title">Todo</h3>
      <ul id="incomplete-tasks" class="main__list list">
        <li class="list__item list-item">
          <input type="checkbox" class="list-item__checkbox">
          <label class="task list-item__label">Pay Bills</label>
          <input type="text" class="list-item__input">
          <button class="button button-edit">Edit</button>
          <button class="button button-delete">
            <img src="./remove.svg" class="button-delete__image">
          </button>
        </li>
        <li class="edit-mode list__item list-item">
          <input type="checkbox" class="list-item__checkbox ">
          <label class="task list-item__label list-item__label-edit">Go Shopping</label>
          <input type="text" value="Go Shopping" class="task list-item__input list-item__input-edit">
          <button class="button button-edit">Save</button>
          <button class="button button-delete">
            <img class="button-delete__image" src="./remove.svg">
          </button>
        </li>
      </ul>
      <h3  class="main__title">Completed</h3>
        <ul id="completed-tasks"  class="main__list list">
          <li class="list__item list-item">
            <input type="checkbox" checked>
            <label class="task list-item__label-trougth">See the Doctor</label>
            <input type="text" class="list-item__input">
            <button class="button button-edit">Edit</button>
            <button class="button button-delete">
              <img src="./remove.svg"  class="button-delete__image">
            </button>
          </li>
        </ul>
    </div>
    <script src="app.js"></script>
  </body>
</html>
